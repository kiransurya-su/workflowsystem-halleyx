spring.application.name=workflowsystem

# Database Configuration
# NOTE: The database 'workflow_db' must be created manually in PostgreSQL.
# I have already executed: psql -U postgres -c "CREATE DATABASE workflow_db;"
spring.datasource.url=jdbc:postgresql://localhost:5432/workflow_db
spring.datasource.username=postgres
spring.datasource.password=
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# Error Details
server.error.include-message=always
server.error.include-stacktrace=always
